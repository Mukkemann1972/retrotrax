name: Build

on:
  push:
  workflow_dispatch:

# Aeltere JS-Actions (z. B. softprops/action-gh-release) auf Node 24 zwingen,
# bevor GitHub Node 20 am 16.06.2026 abschaltet.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows
          - os: macos-latest
            name: macOS
          - os: ubuntu-latest
            name: Linux

    steps:
      - uses: actions/checkout@v6

      - name: Linux-Pakete installieren
        if: runner.os == 'Linux'
        run: |
          # Fremde Paketquellen (Microsoft/Azure) entfernen — deren Server werfen
          # gelegentlich 403 und brechen sonst den ganzen Build ab
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list /etc/apt/sources.list.d/azure-cli.sources /etc/apt/sources.list.d/azure-cli.list
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libfreetype-dev libfontconfig1-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxext-dev libxinerama-dev \
            libxrandr-dev libxrender-dev libcurl4-openssl-dev

      - name: JUCE holen
        run: git clone --depth 1 --branch 8.0.8 https://github.com/juce-framework/JUCE.git libs/JUCE

      - name: clap-juce-extensions holen (fuer das CLAP-Format)
        run: git clone --depth 1 --recurse-submodules --shallow-submodules https://github.com/free-audio/clap-juce-extensions.git libs/clap-juce-extensions

      - name: Konfigurieren
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Bauen
        run: cmake --build build --config Release -j 4

      # Standalone + VST3 in EIN Zip packen — auf dem nativen Runner, damit
      # unter macOS/Linux das Ausfuehrungs-Bit und Symlinks erhalten bleiben.
      - name: Paket schnueren (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}" -replace '^v',''
          $dest = "RetroTrax-Windows-$ver.zip"
          Compress-Archive -Path "build/RetroTrax_artefacts/Release/Standalone/*","build/RetroTrax_artefacts/Release/VST3/*","build/RetroTrax_artefacts/Release/CLAP/*" -DestinationPath $dest
          echo "ASSET=$dest" >> $env:GITHUB_ENV

      - name: Paket schnueren (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          ver="${GITHUB_REF_NAME#v}"
          dest="RetroTrax-${{ matrix.name }}-${ver}.zip"
          ( cd build/RetroTrax_artefacts/Release && zip -ry "$OLDPWD/$dest" Standalone VST3 CLAP )
          echo "ASSET=$dest" >> "$GITHUB_ENV"

      - name: Ergebnis hochladen
        uses: actions/upload-artifact@v7
        with:
          name: RetroTrax-${{ matrix.name }}
          path: ${{ env.ASSET }}

  release:
    name: Release veroeffentlichen
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Pakete holen
        uses: actions/download-artifact@v7
        with:
          path: dist

      - name: Veroeffentlichen
        uses: softprops/action-gh-release@v2
        with:
          name: Mukkemann RetroTrax ${{ github.ref_name }}
          files: dist/**/*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
